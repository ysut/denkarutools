# =============================================================
# 化学療法レジメン定義ファイル（婦人科）
# =============================================================
# 新しいレジメンを追加するときは、既存の [[regimens]] ブロックを
# まるごとコピーして、名前や薬剤を書き換えるだけでOKです。
# 保存すればバックエンドの再起動は不要で、画面の再読み込みで反映されます。
#
# 各項目の意味:
#   id     : レジメンの短い識別名（重複しない）
#   name   : 画面・印刷に表示される名前
#   target : 対象疾患（メモ。画面に表示されます）
#   cycle  : 投与間隔の説明（例: "3週間毎（21日周期）"）
#   daily  : true にすると「連日投与レジメン」として強調表示されます
#
#   [[regimens.days]]  : 投与日。連日投与なら複数書く
#     label  : 表示名（例: "Day 1"）
#     offset : 開始日から何日後か（0 = 初日, 1 = 翌日, ...）
#
#   [[regimens.days.steps]] : その日の点滴の1枠
#     time  : 時間帯（例: "10:30-11:00"）画面上で変更できます
#     drugs : 薬剤のリスト（"薬剤名 用量 単位" の形で1行ずつ）
#             用量は画面上で患者ごとに一時変更できます
# =============================================================

[[regimens]]
id = "TC"
name = "TC療法（パクリタキセル＋カルボプラチン）"
target = "卵巣癌・卵管癌・腹膜癌・子宮体癌など"
cycle = "3週間毎（21日周期）"
daily = false

[[regimens.days]]
label = "Day 1"
offset = 0

[[regimens.days.steps]]
time = "10:30-11:00"
drugs = [
  "ガスター 20 mg",
  "アロカリス 235 mg",
  "デキサート 9.9 mg",
  "生理食塩水 100 mL",
]

[[regimens.days.steps]]
time = "11:00-14:00"
drugs = [
  "パクリタキセル 230 mg",
  "5%ブドウ糖 250 mL",
]

[[regimens.days.steps]]
time = "14:00-15:00"
drugs = [
  "カルボプラチン 300 mg",
  "生理食塩水 250 mL",
]

